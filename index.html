/* ================================================================== *
 *  SiteQA — HV substation QA register
 *  Separate databases per site · offline-first · multi-user · sync
 *  Double-up flagging · plant register · owner & work-element tagging
 *  Multiple per-bay plan sheets (place each tag on its own detail)
 * ================================================================== */
const store = {
    ok: true,
    async set(k, v) { try {
        await idbSet(k, v);
    }
    catch (e) { } },
    async get(k) { try {
        const r = await idbGet(k);
        return r === undefined ? null : r;
    }
    catch {
        return null;
    } },
    async del(k) { try {
        await idbDel(k);
    }
    catch { } },
    async keys(p) { try {
        return (await idbKeys()).filter((k) => typeof k === "string" && k.startsWith(p));
    }
    catch {
        return [];
    } },
};
const syncAdapter = { available: false, async push() { }, async pull() { return []; }, async remove() { } };

const normId = (s) => (s || "").trim().toUpperCase().replace(/\s+/g, "");
function compressImage(file, maxDim = 1280, quality = 0.6) {
    return new Promise((resolve, reject) => {
        const img = new Image();
        const url = URL.createObjectURL(file);
        img.onload = () => {
            let { width, height } = img;
            if (width > height && width > maxDim) {
                height = Math.round((height * maxDim) / width);
                width = maxDim;

  window.addEventListener("load", () => navigator.serviceWorker.register("./sw.js").then(r => r.update()).catch(()=>{}));
}
</script>
